name: TaxMate Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      skip_frontend:
        description: 'Skip frontend deployment'
        required: false
        type: boolean
        default: false
      skip_backend:
        description: 'Skip backend deployment'
        required: false
        type: boolean
        default: false

env:
  NODE_ENV: production

jobs:
  predeploy-checks:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      skip_frontend: ${{ steps.set-env.outputs.skip_frontend }}
      skip_backend: ${{ steps.set-env.outputs.skip_backend }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set deployment environment
        id: set-env
        run: |
          ENVIRONMENT="${{ github.event.inputs.environment || 'production' }}"
          SKIP_FRONTEND="${{ github.event.inputs.skip_frontend || 'false' }}"
          SKIP_BACKEND="${{ github.event.inputs.skip_backend || 'false' }}"

          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "skip_frontend=$SKIP_FRONTEND" >> $GITHUB_OUTPUT
          echo "skip_backend=$SKIP_BACKEND" >> $GITHUB_OUTPUT

          echo "🚀 Deploying to $ENVIRONMENT environment"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Verify backend app boots
        run: npm run verify:backend
        env:
          NODE_ENV: production
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MONGO_URI: ${{ secrets.MONGO_URI }}

      - name: Build frontend
        if: steps.set-env.outputs.skip_frontend != 'true'
        run: npm run build
        working-directory: frontend
        env:
          CI: true
          REACT_APP_API_BASE_URL: https://api.taxmate.in

      - name: Run tests
        run: npm test -- --coverage --watchAll=false
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-key
          MONGO_URI: mongodb://localhost:27017/test

  deploy-backend:
    runs-on: ubuntu-latest
    needs: predeploy-checks
    if: needs.predeploy-checks.outputs.skip_backend != 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger Render deploy
        id: render-deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "🚀 Triggering Render deployment..."

          # Trigger deployment
          response=$(curl --fail-with-body --silent --show-error \
            -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}')

          deploy_id=$(echo "$response" | jq -r '.id')

          if [ "$deploy_id" != "null" ] && [ -n "$deploy_id" ]; then
            echo "✅ Backend deployment triggered. Deploy ID: $deploy_id"
            echo "deploy_id=$deploy_id" >> $GITHUB_OUTPUT

            # Wait for deployment to complete
            echo "⏳ Waiting for deployment to complete..."
            max_attempts=60
            attempt=1

            while [ $attempt -le $max_attempts ]; do
              status_response=$(curl --silent --show-error \
                -H "Authorization: Bearer ${RENDER_API_KEY}" \
                "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${deploy_id}")

              status=$(echo "$status_response" | jq -r '.status')

              case $status in
                "live")
                  echo "✅ Backend deployment completed successfully!"
                  exit 0
                  ;;
                "build_failed"|"failed")
                  echo "❌ Backend deployment failed!"
                  echo "$status_response" | jq '.'
                  exit 1
                  ;;
                "building"|"in_progress")
                  echo "⏳ Deployment in progress... (attempt ${attempt}/${max_attempts})"
                  sleep 15
                  ;;
                *)
                  echo "⚠️  Unknown deployment status: ${status}"
                  sleep 10
                  ;;
              esac

              ((attempt++))
            done

            echo "❌ Deployment timeout after ${max_attempts} attempts"
            exit 1
          else
            echo "❌ Failed to trigger backend deployment"
            echo "$response"
            exit 1
          fi

      - name: Health check
        run: |
          echo "🔍 Running backend health check..."
          max_retries=10
          retry_count=0

          while [ $retry_count -lt $max_retries ]; do
            if curl --silent --fail --max-time 30 https://api.taxmate.in/health > /dev/null; then
              echo "✅ Backend health check passed"
              exit 0
            else
              echo "⏳ Health check failed, retrying... ($((retry_count + 1))/$max_retries)"
              sleep 30
              ((retry_count++))
            fi
          done

          echo "❌ Backend health check failed after $max_retries attempts"
          exit 1

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [predeploy-checks, deploy-backend]
    if: needs.predeploy-checks.outputs.skip_frontend != 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Vercel project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          REACT_APP_API_BASE_URL: https://api.taxmate.in

      - name: Deploy to Vercel
        id: vercel-deploy
        run: |
          echo "🚀 Deploying to Vercel..."
          deploy_output=$(vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1)
          deploy_url=$(echo "$deploy_output" | grep -o 'https://[^ ]*' | tail -1)

          if [ -n "$deploy_url" ]; then
            echo "✅ Frontend deployed successfully!"
            echo "🌐 Frontend URL: $deploy_url"
            echo "frontend_url=$deploy_url" >> $GITHUB_OUTPUT
          else
            echo "❌ Frontend deployment failed!"
            echo "$deploy_output"
            exit 1
          fi
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Frontend health check
        run: |
          echo "🔍 Running frontend health check..."
          frontend_url="${{ steps.vercel-deploy.outputs.frontend_url }}"

          if [ -n "$frontend_url" ]; then
            max_retries=5
            retry_count=0

            while [ $retry_count -lt $max_retries ]; do
              if curl --silent --fail --max-time 30 "$frontend_url" > /dev/null; then
                echo "✅ Frontend health check passed"
                exit 0
              else
                echo "⏳ Health check failed, retrying... ($((retry_count + 1))/$max_retries)"
                sleep 15
                ((retry_count++))
              fi
            done

            echo "❌ Frontend health check failed after $max_retries attempts"
            exit 1
          else
            echo "⚠️  Skipping frontend health check (no URL available)"
          fi

  post-deploy:
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: success()

    steps:
      - name: Deployment Summary
        run: |
          echo "🎉 TaxMate deployment completed successfully!"
          echo ""
          echo "📱 Frontend: https://app.taxmate.in"
          echo "🔗 API: https://api.taxmate.in"
          echo "📚 API Docs: https://api.taxmate.in/api-docs"
          echo "🔍 Health Check: https://api.taxmate.in/health"
          echo ""
          echo "Environment: ${{ needs.predeploy-checks.outputs.environment }}"
          echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ TaxMate deployment failed!"
          echo "Check the logs above for details."
          echo "Environment: ${{ needs.predeploy-checks.outputs.environment }}"
          echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"


      - name: Deploy Vercel project
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}