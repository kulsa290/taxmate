version: '3.8'

services:
  # ===========================================
  # TaxMate Backend API
  # ===========================================
  taxmate-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: taxmate-api
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/taxmate-dev
      - JWT_SECRET=dev-jwt-secret-key-for-docker-compose
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - mongodb
    networks:
      - taxmate-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================
  # MongoDB Database
  # ===========================================
  mongodb:
    image: mongo:7-jammy
    container_name: taxmate-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=taxmate-dev
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo-init:/docker-entrypoint-initdb.d
    networks:
      - taxmate-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ===========================================
  # TaxMate Frontend (Development)
  # ===========================================
  taxmate-frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: taxmate-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_BASE_URL=http://localhost:5000
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - taxmate-api
    networks:
      - taxmate-network
    restart: unless-stopped
    profiles:
      - frontend

  # ===========================================
  # Redis (Optional - for caching/session storage)
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: taxmate-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - taxmate-network
    profiles:
      - cache
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s

volumes:
  mongodb_data:
  redis_data:

networks:
  taxmate-network:
    driver: bridge
